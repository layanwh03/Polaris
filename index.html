<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Layan Portfolio - Video</title>
    <style>
      :root {
        --bg: #f9fafb;
        --frame: #1c1c1e;
        --frame-border: #424245;
        --glass: rgba(22, 22, 22, 0.75);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #374151; /* gray-700 */
        --text-muted: #6b7280; /* gray-500 */
        --text-hover: #111827; /* gray-900 */
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: var(--bg);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
        padding: 40px 24px;
      }

      /* --- BACK TO HOME LINK --- */
      .nav-header {
        width: 100%;
        max-width: 800px;
        margin-bottom: 48px;
      }

      .back-home {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text-main);
        text-decoration: none;
        font-size: 18px;
        font-weight: 400;
        transition: color 0.2s ease;
      }

      .back-home:hover {
        color: var(--text-hover);
      }

      .back-home svg {
        width: 20px;
        height: 20px;
      }

      /* --- COMPACT PHONE CHASSIS --- */
      .phone-container {
        position: relative;
        width: 260px;
        height: 560px; /* Increased by 20px as requested */
        border: 10px solid var(--frame);
        border-radius: 40px;
        box-shadow:
          0 0 0 1px var(--frame-border),
          0 25px 50px -12px rgba(0, 0, 0, 0.15);
        background: #000;
        overflow: hidden;
        z-index: 1;
      }

      .notch {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 70px;
        height: 20px;
        background: #000;
        border-radius: 20px;
        z-index: 10;
        pointer-events: none;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* --- FLOATING CONTROLS --- */
      .controls-layer {
        position: absolute;
        bottom: 20px;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: center;
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
        z-index: 20;
      }

      .phone-container:hover .controls-layer,
      .controls-layer.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .glass-dock {
        display: flex;
        gap: 12px;
        padding: 10px 16px;
        background: var(--glass);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
      }

      .ctrl-btn {
        background: transparent;
        border: none;
        color: var(--white);
        cursor: pointer;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px;
      }

      /* --- PROGRESS NOTE --- */
      .status-note {
        margin-top: 32px;
        font-size: 14px;
        color: var(--text-muted);
        text-align: center;
      }

      /* --- MOBILE OVERRIDES --- */
      @media (max-width: 600px) {
        body {
          padding: 20px 0;
          background: #fff;
        }
        .nav-header {
          padding-left: 24px;
          margin-bottom: 24px;
        }
        .phone-container {
          width: 100%;
          height: calc(100dvh - 140px);
          border: none;
          border-radius: 0;
          box-shadow: none;
        }
        .notch {
          display: none;
        }
        .controls-layer {
          bottom: 40px;
        }
        .status-note {
          margin-top: 16px;
          padding: 0 20px;
        }
      }
    </style>
  </head>
  <body>
    <header class="nav-header">
      <a href="https://layanportfolio.figma.site/" class="back-home">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Home
      </a>
    </header>

    <main class="phone-container" id="phoneArea">
      <div class="notch"></div>
      <video
        id="vid"
        src="WhatsApp Video 2026-02-17 at 11.02.53 PM.mp4"
        autoplay
        loop
        muted
        playsinline
      ></video>

      <div class="controls-layer" id="controlsLayer">
        <div class="glass-dock">
          <button class="ctrl-btn" id="toggle">
            <span id="p-icon">⏸</span>
            <span id="p-text">Pause</span>
          </button>
          <button class="ctrl-btn" id="muteToggle">🔇</button>
          <button class="ctrl-btn" id="restart">↺</button>
        </div>
      </div>
    </main>

    <footer class="status-note">This project is currently in progress.</footer>

    <script>
      const video = document.getElementById("vid");
      const toggleBtn = document.getElementById("toggle");
      const muteBtn = document.getElementById("muteToggle");
      const restartBtn = document.getElementById("restart");
      const controlsLayer = document.getElementById("controlsLayer");

      toggleBtn.addEventListener("click", () => {
        if (video.paused) video.play();
        else video.pause();
      });

      video.addEventListener("play", () => {
        document.getElementById("p-icon").textContent = "⏸";
        document.getElementById("p-text").textContent = "Pause";
      });

      video.addEventListener("pause", () => {
        document.getElementById("p-icon").textContent = "▶";
        document.getElementById("p-text").textContent = "Play";
      });

      muteBtn.addEventListener("click", () => {
        video.muted = !video.muted;
        muteBtn.textContent = video.muted ? "🔇" : "🔊";
      });

      restartBtn.addEventListener("click", () => {
        video.currentTime = 0;
        video.play();
      });

      video.addEventListener("click", () => {
        controlsLayer.classList.toggle("visible");
      });
    </script>
  </body>
</html>
